name: Samples CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *" # daily at 09:00 UTC

jobs:
  smoke:
    name: Samples Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sample smoke checks
        run: |
          bash samples/ci/run_samples_ci.sh smoke

  integration:
    name: Samples Integration
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && secrets.AOC_BASE_URL != '' && secrets.AOC_ORG_ID != '' && secrets.AOC_PROVISIONING_TOKEN != '' && secrets.AGENT_TEMPLATE_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK for integration
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "sdk/python[modulation]"

      - name: Run sample integration checks
        env:
          AOC_BASE_URL: ${{ secrets.AOC_BASE_URL }}
          AOC_ORG_ID: ${{ secrets.AOC_ORG_ID }}
          AOC_PROVISIONING_TOKEN: ${{ secrets.AOC_PROVISIONING_TOKEN }}
          AGENT_TEMPLATE_ID: ${{ secrets.AGENT_TEMPLATE_ID }}
          ROBOT_AGENT_TEMPLATE_ID: ${{ secrets.ROBOT_AGENT_TEMPLATE_ID }}
          PERSONALIZE_ANCHOR: ${{ secrets.PERSONALIZE_ANCHOR }}
          HELLOWORLD_CI_PROMPT: "ci integration ping"
          ROBOT_CI_PROMPT: "robot ci integration ping"
        run: |
          bash samples/ci/run_samples_ci.sh integration
